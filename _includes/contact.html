<section class="section-frame section-frame--ink" id="contact">
    <span class="section-tag">[Anm/03] &middot; Beta</span>
    <span class="section-tag section-tag--right">Now Open</span>

    <div class="contact-grid">
        <h2 class="contact-title">Ready to&nbsp;build with Animaquina?</h2>

        <div>
            <p class="contact-copy">
                Join the private beta. Get early access, shape the roadmap, and start programming robots interactively.
            </p>
            <div class="contact-actions">
                <a href="{{site.waitlist-url}}" class="btn btn--invert">
                    Join the waitlist <span class="arrow">&rarr;</span>
                </a>
                {% unless site.email == "" %}
                <a href="mailto:{{site.email}}" class="btn btn--ghost-light">
                    Contact us
                </a>
                {% endunless %}
            </div>
        </div>
    </div>
</section>
