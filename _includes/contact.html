<section class="hero has-text-centered has-background-white-ter" id="contact">
    <div class="hero-body">
        <div class="container">
            <h2 class="title is-size-3 has-text-black">Ready to try Animaquina?</h2>
            <p class="subtitle has-text-grey">Join the beta and start building with interactive robotics.</p>
            <div class="buttons is-centered">
                <a href="{{site.waitlist-url}}" class="button is-black is-uppercase has-text-weight-semibold is-medium">
                    Join the waiting list
                </a>
                {% unless site.email == %}
                <a href="mailto:{{site.email}}" class="button is-outlined is-black is-uppercase has-text-weight-semibold is-medium">
                    <i class="fas fa-envelope"></i>&nbsp;Contact us
                </a>
                {% endunless %}
            </div>
        </div>
    </div>
</section>
