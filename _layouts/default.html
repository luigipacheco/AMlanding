<!DOCTYPE html>
<html lang="en">
{% include head.html %}

<body>
  {% include navbar.html %}
  {% include showcase.html %}
  {% include about.html %}
  {% include features.html %}
  {% include contact.html %}
  {% include footer.html %}

  <script>
    (function () {
      var navItems = document.querySelectorAll('#navbar a.navbar-item');
      var sectionIds = ['hero', 'about', 'features', 'contact'];
      var sections = sectionIds.map(function (id) { return document.getElementById(id); }).filter(Boolean);
      var viewOffset = 200;

      function setActive() {
        var scroll = window.scrollY || window.pageYOffset;
        var activeIndex = -1;
        for (var i = 0; i < sections.length; i++) {
          var top = sections[i].offsetTop - viewOffset;
          var bottom = top + sections[i].offsetHeight;
          if (scroll >= top && scroll < bottom) { activeIndex = i; break; }
        }
        for (var j = 0; j < navItems.length; j++) navItems[j].classList.remove('is-active');
        if (activeIndex !== -1 && navItems[activeIndex]) {
          navItems[activeIndex].classList.add('is-active');
        }
      }

      window.addEventListener('scroll', setActive, { passive: true });
      window.addEventListener('load', setActive);
    })();
  </script>
</body>

</html>
